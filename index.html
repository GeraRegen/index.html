
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Частная психотерапия Гродно.by</title>
    <style>
        /* Общие стили */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        /* Стили для фиксированного прямоугольника */
        .rectangle {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #007bff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 16px;
        }

        .left-text {
            font-weight: bold;
        }

        .right-text {
            font-style: italic;
        }

        /* Отступ для контента, чтобы не перекрывался прямоугольником */
        .content {
            padding-top: 70px;
            text-align: center;
        }

        /* Стили для ссылок */
        a {
            color: #007BFF;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Стили для текста */
        p {
            margin: 10px 0;
        }

        /* Стили для изображений */
        img {
            max-width: 100%;
            height: auto;
            margin: 10px 0;
        }

        /* Стили для футера */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #007bff;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- Фиксированный прямоугольник -->
    <div class="rectangle">

        </div>

</body>
</html>
