<!DOCTYPE html>
<html lang="ru">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма с телефоном</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            text-align: center;
            margin-top: 50px;
        }

        .clickable-image {
            width: 300px;
            height: auto;
            cursor: pointer;
            border: 3px solid #ddd;
            border-radius: 10px;
            transition: transform 0.3s;
        }

        .clickable-image:hover {
            transform: scale(1.05);
        }

        /* Стили модального окна */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 400px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: black;
        }

        input[type="tel"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }


    </style>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="container">
        <h1>Нажмите на изображение</h1>
        <img src="../static/image.jpg" alt="Нажмите меня" class="clickable-image" onclick="openModal()">
    </div>

    <!-- Модальное окно -->
    <div id="phoneModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Введите ваш номер телефона</h2>
            <form action="/submit_phone" method="post">
                <input type="tel" name="phone" placeholder="+375XXXXXXXXX или +7XXXXXXXXXX" required
                       pattern="(\+375\d{9}|\+7\d{10})"
                       title="Формат: +375XXXXXXXXX или +7XXXXXXXXXX">
                <button type="submit">Отправить</button>
            </form>
        </div>
    </div>

    <script>
        function openModal() {
            document.getElementById('phoneModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('phoneModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('phoneModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
